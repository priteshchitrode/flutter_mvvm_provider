# =========================================================
# 🚀 Flutter CI/CD Pipeline
#
# This workflow will:
# 1. Trigger on selected branches
# 2. Detect environment automatically
# 3. Generate app version automatically
# 4. Build Android APK
# 5. Upload APK as GitHub artifact
# 6. Upload APK to Firebase App Distribution
# 7. Build Flutter Web
# 8. Upload Web build as GitHub artifact
# =========================================================

name: Flutter CI CD

# =========================================================
# 🔁 Pipeline Trigger Rules
#
# ci-cd-git-pipeline  → for testing CI/CD changes
# deploy/dev-env      → dev environment build
# deploy/prod-env     → production environment build
# workflow_dispatch   → manual run from GitHub Actions UI
# =========================================================
on:
  push:
    branches:
      - ci-cd-git-pipeline
      - deploy/dev-env
      - deploy/prod-env

  pull_request:
    branches:
      - deploy/dev-env
      - deploy/prod-env

  workflow_dispatch:

# =========================================================
# 🔢 Global Version Management
#
# GitHub.run_number increases automatically on every workflow run.
#
# Example:
# Run 25 → Version: 1.0.25, Build Number: 25
# Run 26 → Version: 1.0.26, Build Number: 26
#
# Firebase will show:
# 1.0.25 (25)
# 1.0.26 (26)
# =========================================================
env:
  BUILD_NUMBER: ${{ github.run_number }}
  APP_VERSION: 1.0.${{ github.run_number }}

jobs:
  # =========================================================
  # 📱 Android APK Build + Firebase App Distribution
  # =========================================================
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 📥 Step 1: Checkout repository code
      # -----------------------------------------
      - name: Checkout project
        uses: actions/checkout@v4

      # -----------------------------------------
      # 🌍 Step 2: Detect Environment
      #
      # deploy/prod-env → production
      # all other branches → dev
      #
      # FIREBASE_GROUP:
      # dev        → testers
      # production → production-testers
      # -----------------------------------------
      - name: Setup environment
        run: |
          if [ "$GITHUB_REF_NAME" = "deploy/prod-env" ]; then
            echo "APP_ENV=production" >> $GITHUB_ENV
            echo "FIREBASE_GROUP=production-testers" >> $GITHUB_ENV
          else
            echo "APP_ENV=dev" >> $GITHUB_ENV
            echo "FIREBASE_GROUP=testers" >> $GITHUB_ENV
          fi

      # -----------------------------------------
      # ☕ Step 3: Setup Java 17
      # Required for Android Gradle build
      # -----------------------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # -----------------------------------------
      # 🐦 Step 4: Setup Flutter SDK
      # cache: true makes future builds faster
      # -----------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # -----------------------------------------
      # 🔍 Step 5: Check Flutter version
      # Useful for debugging CI build issues
      # -----------------------------------------
      - name: Check Flutter version
        run: flutter --version

      # -----------------------------------------
      # 📦 Step 6: Install Flutter dependencies
      # -----------------------------------------
      - name: Get dependencies
        run: flutter pub get --no-precompile

      # -----------------------------------------
      # 🧹 Step 7: Analyze code
      #
      # --no-fatal-infos and --no-fatal-warnings
      # prevent warnings from failing the pipeline.
      # -----------------------------------------
      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # -----------------------------------------
      # 🧪 Step 8: Run tests
      #
      # continue-on-error: true means test failure
      # will not stop APK build.
      # -----------------------------------------
      - name: Run tests optional
        run: flutter test
        continue-on-error: true

      # -----------------------------------------
      # 🏗 Step 9: Build Release APK
      #
      # --dart-define=ENV passes dev/production to Flutter.
      # --build-name sets versionName.
      # --build-number sets versionCode.
      #
      # Example output:
      # Version Name: 1.0.25
      # Build Number: 25
      # -----------------------------------------
      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=ENV=$APP_ENV \
            --build-name=$APP_VERSION \
            --build-number=$BUILD_NUMBER

      # -----------------------------------------
      # 📤 Step 10: Upload APK to GitHub Artifacts
      #
      # You can download APK from:
      # GitHub → Actions → Workflow Run → Artifacts
      # -----------------------------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ env.APP_ENV }}-apk-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: build/app/outputs/flutter-apk/app-release.apk

      # -----------------------------------------
      # 🔐 Step 11: Create Firebase Service Account File
      #
      # FIREBASE_SERVICE_ACCOUNT_JSON must be added in:
      # GitHub → Settings → Secrets and variables → Actions
      # -----------------------------------------
      - name: Create Firebase service account file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > firebase-service-account.json

      # -----------------------------------------
      # 🔧 Step 12: Install Firebase CLI
      # Required to upload APK to Firebase App Distribution
      # -----------------------------------------
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # -----------------------------------------
      # 🚀 Step 13: Upload APK to Firebase App Distribution
      #
      # Required GitHub Secrets:
      # FIREBASE_ANDROID_APP_ID
      # FIREBASE_SERVICE_ACCOUNT_JSON
      #
      # Firebase Groups:
      # dev        → testers
      # production → production-testers
      # -----------------------------------------
      - name: Upload APK to Firebase App Distribution
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "${{ secrets.FIREBASE_ANDROID_APP_ID }}" \
            --groups "$FIREBASE_GROUP" \
            --release-notes "Env: $APP_ENV | Version: $APP_VERSION ($BUILD_NUMBER) | Branch: $GITHUB_REF_NAME | Commit: $GITHUB_SHA"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json



  # =========================================================
  # 🌐 Flutter Web Build
  # =========================================================
  web-build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------
      # 📥 Step 1: Checkout repository code
      # -----------------------------------------
      - name: Checkout project
        uses: actions/checkout@v4

      # -----------------------------------------
      # 🌍 Step 2: Detect Environment
      #
      # deploy/prod-env → production
      # all other branches → dev
      # -----------------------------------------
      - name: Setup environment
        run: |
          if [ "$GITHUB_REF_NAME" = "deploy/prod-env" ]; then
            echo "APP_ENV=production" >> $GITHUB_ENV
          else
            echo "APP_ENV=dev" >> $GITHUB_ENV
          fi

      # -----------------------------------------
      # 🐦 Step 3: Setup Flutter SDK
      # -----------------------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # -----------------------------------------
      # 📦 Step 4: Install Flutter dependencies
      # -----------------------------------------
      - name: Get dependencies
        run: flutter pub get --no-precompile

      # -----------------------------------------
      # 🌐 Step 5: Enable Flutter Web
      # -----------------------------------------
      - name: Enable web
        run: flutter config --enable-web

      # -----------------------------------------
      # 🏗 Step 6: Build Flutter Web
      #
      # ENV is passed to Flutter using dart-define.
      # -----------------------------------------
      - name: Build web
        run: flutter build web --release --dart-define=ENV=$APP_ENV

      # -----------------------------------------
      # 📤 Step 7: Upload Web Build Artifact
      # -----------------------------------------
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ env.APP_ENV }}-web-build-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: build/web